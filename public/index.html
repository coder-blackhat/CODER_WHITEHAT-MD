<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XWOLF BOT - Link Device</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff88, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff88, #00aaff);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .code-box {
            background: #0a0a0a;
            border: 2px dashed #00ff88;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        #qrImg {
            width: 250px;
            height: 250px;
            margin: 10px auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            display: block;
        }
        .steps {
            text-align: left;
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            line-height: 1.8;
        }
        .error {
            background: #ff33331a;
            border: 1px solid #ff3333;
            color: #ff6666;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .loader {
            border: 3px solid #333;
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success {
            background: #00ff881a;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>XWOLF BOT</h1>
        <p class="subtitle">Link your WhatsApp to the bot</p>
        
        <button id="pairBtn" onclick="getQRCode()">Generate QR Code</button>
        
        <div class="loader" id="loader"></div>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        
        <div class="code-box" id="codeBox">
            <div style="color: #888; font-size: 14px; margin-bottom: 10px;">Scan with WhatsApp:</div>
            <img id="qrImg" src="" alt="QR Code">
            <div style="color: #ff6666; font-size: 12px; margin-top: 10px;">QR expires in 60 seconds</div>
        </div>

        <div class="steps" id="steps" style="display: none;">
            <b>How to link:</b><br>
            1. Open WhatsApp on your phone<br>
            2. Tap Settings > Linked Devices<br>
            3. Tap "Link a Device"<br>
            4. Scan the QR code above
        </div>
    </div>

    <script>
        async function getQRCode() {
            const btn = document.getElementById('pairBtn')
            const loader = document.getElementById('loader')
            const error = document.getElementById('error')
            const success = document.getElementById('success')
            const codeBox = document.getElementById('codeBox')
            const qrImg = document.getElementById('qrImg')
            const steps = document.getElementById('steps')

            btn.disabled = true
            btn.textContent = 'Generating QR...'
            loader.style.display = 'block'
            error.style.display = 'none'
            success.style.display = 'none'
            codeBox.style.display = 'none'
            steps.style.display = 'none'

            try {
                const res = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                })
                const data = await res.json()

                if (data.success && data.qr) {
                    qrImg.src = data.qr
                    codeBox.style.display = 'block'
                    steps.style.display = 'block'
                    success.textContent = 'QR generated! Scan within 60s'
                    success.style.display = 'block'
                    
                    setTimeout(() => {
                        codeBox.style.display = 'none'
                        steps.style.display = 'none'
                        success.style.display = 'none'
                        btn.textContent = 'Generate QR Code'
                    }, 60000)
                } else {
                    showError(data.error || 'Failed to generate QR')
                }
            } catch (e) {
                showError('Server error. Check if server.js is running.')
            } finally {
                btn.disabled = false
                btn.textContent = 'Generate QR Code'
                loader.style.display = 'none'
            }
        }

        function showError(msg) {
            const error = document.getElementById('error')
            error.textContent = msg
            error.style.display = 'block'
        }
    </script>
</body>
</html>
